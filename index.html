<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Main Page</title>
    <link rel="stylesheet" href="style.css">
    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"; rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</head>
<body>
    <nav class="navbar navbar-expand-sm bg-dark navbar-dark">
        <div class="container-fluid">
        <a class="navbar-brand" href="#">
            <img src="eSakayMo.png" src="esakaymo.png" style="width:40px;" class="rounded"> 
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mynavbar">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="mynavbar">
            <ul class="navbar-nav me-auto">
            <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
            <li class="nav-item"><a class="nav-link" href="#">Fare Matrix</a></li>
            <li class="nav-item"><a class="nav-link" href="#">Schedule</a></li>
            <li class="nav-item"><a class="nav-link" href="#">Help</a></li>
            </ul>  
            <form class="d-flex">
            <button class="btn btn-primary" type="button" onclick="window.location.href='registration.html'">Create Account</button>
            </form>
        </div>
    </nav>
    <main class="container-fluid mt-3 mb-5">
        <div class="row justify-content-center">
            <div class="col-md-8 col-lg-7">
                <div class="container p-5 bg-light text-dark rounded shadow-lg">
                    <div class="text-center mb-4">
                        <img src="esakaymo.png" width="70">
                        <h2>Welcome to <span class="text-warning">eSakayMo</span> Fare Guide</h2>
                        <p class="text-secondary">Compute your estimated fare easily.</p>
                    </div>
                    <div class="bg-white p-3 rounded shadow-sm">
                        <div class="row align-items-center">
                            <div class="col-md-4 text-center">
                                <img src="metro_Fare.png" alt="Metro Fare" class="img-fluid">
                            </div>
                            <div class="col-md-8">
                                <h4 class="mb-3">Fare Matrix</h4>
                                <div class="mb-3">
                                    <label class="form-label">Pick-Up Location</label>
                                    <select id="pick" class="form-select">
                                        <option value="0">North Avenue</option>
                                        <option value="1">Quezon Avenue</option>
                                        <option value="2">Kamuning</option>
                                        <option value="3">Araneta Center-Cubao</option>
                                        <option value="4">Santolan-Annapolis</option>
                                        <option value="5">Ortigas</option>
                                        <option value="6">Shaw Boulevard</option>
                                        <option value="7">Boni</option>
                                        <option value="8">Guadalupe</option>
                                        <option value="9">Buendia</option>
                                        <option value="10">Ayala</option>
                                        <option value="11">Magallanes</option>
                                        <option value="12">Taft Avenue</option>
                                    </select>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label">Drop-Off Location</label>
                                    <select id="drop" class="form-select">
                                        <option value="0">North Avenue</option>
                                        <option value="1">Quezon Avenue</option>
                                        <option value="2">Kamuning</option>
                                        <option value="3">Araneta Center-Cubao</option>
                                        <option value="4">Santolan-Annapolis</option>
                                        <option value="5">Ortigas</option>
                                        <option value="6">Shaw Boulevard</option>
                                        <option value="7">Boni</option>
                                        <option value="8">Guadalupe</option>
                                        <option value="9">Buendia</option>
                                        <option value="10">Ayala</option>
                                        <option value="11">Magallanes</option>
                                        <option value="12">Taft Avenue</option>
                                    </select>
                                </div>
                                <div class="form-check mb-3">
                                    <input class="form-check-input" type="checkbox" id="discountCheck">
                                    <label class="form-check-label" for="discountCheck">Senior/PWD Discount (20%)</label>
                                </div>
                                <button class="btn btn-warning" onclick="calculateFare()">Compute Fare</button>
                                <div id="fareResult" class="mt-3 alert alert-info text-center" style="display: none;"></div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>
    <footer class="text-center py-3 bg-dark text-light mt-auto fixed-bottom">
         Group 4 | 9 Emerald &copy; 2026
    </footer>
</body>
    <script src="proj.js"></script>
</html>
