</head>
<body>
    <header class="navbar navbar-expand-sm navbar-dark bg-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="#"><img src="esakaymo.png" width="50px"></a>
        </div>
        <ul class="navbar-nav me-auto">
            <li class="nav-item">
                <a class="nav-link" href="index.html">Home</a>
            </li>
            <li class="nav-item">
                <a class="nav-link" href="#">Fare Matrix</a>

            <li class="nav-item">

            </li>

                <a class="nav-link" href="#">Help</a>
            </li>
        </ul>
        <form class="d-flex">
            <button class="btn btn-primary" type="button" href="registration.html">Create Accounnt</button>
        </form>
    </header>

    <div class="container mt-5">
    <h2 class="text-center mb-4">Create an Account</h2>

    <form action="confirmation.html">

            <div class="mb-3">
                <label class="form-label">First Name</label>
                <input type="text" class="form-control" required>
            </div>
    
            <div class="mb-3">
                <label class="form-label">Last Name</label>
                <input type="text" class="form-control" required>
            </div>
    
            <div class="mb-3">
                <label class="form-label">Age</label>
                <input type="number" class="form-control" required>
            </div>
    
            <div class="mb-3">
                <label class="form-label">Phone Number</label>
                <input type="number" class="form-control" required>
            </div>
    
            <div class="mb-3">
                <label class="form-label">Email</label>
                <input type="email" class="form-control" required>
            </div>
    
            <div class="mb-3">
                <label class="form-label">Username</label>
                <input type="text" class="form-control" required>
            </div>
    
            <div class="mb-3">
                <label class="form-label">Password</label>
                <input type="password" class="form-control" required>
            </div>
    
            <div class="text-center">
                <button type="submit" class="btn btn-success">Submit</button>
            </div>

            <button class="btn btn-warning" type="button" onclick="window.location.href='confirmation.html'"></button>
    
        </form>
    </div>
